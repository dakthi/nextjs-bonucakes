<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Bonu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{cream:'#FDF8F3',warmwhite:'#FFFBF5',terracotta:'#C4704A',espresso:'#3D2314',gold:'#D4A853',coffee:'#4A3728'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-cream min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-espresso/95 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-3xl font-bold text-gold" style="font-family: 'Playfair Display', serif;">Bonu F&B</a>
            <div class="flex items-center gap-6">
                <a href="/story.html" class="text-cream/80 hover:text-white transition-colors hidden md:block">Câu chuyện</a>
                <a href="/#courses" class="text-cream/80 hover:text-white transition-colors hidden md:block">Tư vấn</a>
                <a href="/#courses" class="text-cream/80 hover:text-white transition-colors hidden md:block">Khóa học</a>
                <a href="/blog.html" class="text-cream/80 hover:text-white transition-colors hidden md:block">Blog</a>
                <a href="/#contact" class="text-cream/80 hover:text-white transition-colors hidden md:block">Liên hệ</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="bg-warmwhite py-24 md:py-28 border-b border-espresso/10">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h1 class="text-4xl font-bold text-espresso mb-4">Blog</h1>
            <p class="text-coffee max-w-2xl mx-auto">Chia sẻ kinh nghiệm, góc nhìn và hành trình trong ngành F&B</p>
        </div>
    </header>

    <!-- Posts Grid -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- 3 Column Newspaper Grid -->
        <div id="posts-grid" class="grid md:grid-cols-3 gap-8">
            <!-- Posts loaded here -->
        </div>

        <!-- Pagination -->
        <div id="pagination" class="hidden mt-12 flex justify-center items-center gap-2">
            <!-- Pagination loaded here -->
        </div>

        <div id="no-posts" class="hidden text-center py-12 text-coffee">
            Chưa có bài viết nào.
        </div>
        <div id="loading" class="text-center py-12 text-coffee">
            Đang tải...
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-espresso border-t border-gold/20 py-12">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <span class="text-2xl font-bold text-gold" style="font-family: 'Playfair Display', serif;">Bonu F&B</span>
                </div>
                <div class="flex gap-6 text-cream/60 text-sm">
                    <a href="/" class="hover:text-white transition-colors">Trang chủ</a>
                    <a href="/blog.html" class="hover:text-white transition-colors">Blog</a>
                </div>
            </div>
            <div class="border-t border-cream/10 mt-8 pt-8 text-center text-cream/40 text-sm">
                <p>&copy; 2026 Uyen Nguyen - F&B Business Design</p>
            </div>
        </div>
    </footer>

    <script>
        const POSTS_PER_PAGE = 12; // 3 columns x 4 rows
        let allPosts = [];
        let currentPage = 1;

        async function loadPosts() {
            try {
                const res = await fetch('/posts.json');
                const posts = await res.json();

                // Filter published posts and sort by date (newest first)
                allPosts = posts
                    .filter(p => p.status === 'published')
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                document.getElementById('loading').classList.add('hidden');

                if (allPosts.length === 0) {
                    document.getElementById('no-posts').classList.remove('hidden');
                    return;
                }

                // Get page from URL
                const urlParams = new URLSearchParams(window.location.search);
                currentPage = parseInt(urlParams.get('page') || '1');

                renderPage();
            } catch (e) {
                document.getElementById('loading').textContent = 'Không thể tải bài viết.';
                console.error(e);
            }
        }

        function renderPage() {
            const startIndex = (currentPage - 1) * POSTS_PER_PAGE;
            const endIndex = startIndex + POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(startIndex, endIndex);

            // 3 column newspaper grid
            const grid = document.getElementById('posts-grid');
            grid.innerHTML = pagePosts.map((post) => `
                <article class="border-b border-espresso/10 pb-8 hover:border-terracotta/30 transition-colors">
                    <a href="/blog/${post.slug}.html" class="block group">
                        ${post.image ? `
                            <div class="mb-4 bg-white border border-espresso/5 p-2">
                                <img src="${post.image}" alt="${post.title}"
                                     class="w-full h-auto object-contain">
                            </div>
                        ` : ''}
                        <time class="text-xs text-coffee/60 uppercase tracking-wider">${formatDate(post.date)}</time>
                        <h2 class="text-xl font-bold text-espresso mt-2 mb-3 leading-tight group-hover:text-terracotta transition-colors">
                            ${post.title}
                        </h2>
                        ${post.excerpt ? `
                            <p class="text-coffee text-sm leading-relaxed line-clamp-3 mb-3">
                                ${post.excerpt}
                            </p>
                        ` : ''}
                        <span class="text-terracotta text-sm font-medium group-hover:underline">
                            Đọc tiếp →
                        </span>
                    </a>
                </article>
            `).join('');

            // Render pagination
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
            if (totalPages <= 1) return;

            const paginationEl = document.getElementById('pagination');
            paginationEl.classList.remove('hidden');

            let html = '';

            // Previous button
            if (currentPage > 1) {
                html += `
                    <a href="?page=${currentPage - 1}"
                       class="px-4 py-2 rounded-lg bg-white text-coffee border border-coffee/20 hover:bg-terracotta hover:text-white transition-colors">
                        ← Trước
                    </a>
                `;
            }

            // Page numbers
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);

            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                html += `<a href="?page=1" class="px-4 py-2 rounded-lg bg-white text-coffee border border-coffee/20 hover:bg-terracotta hover:text-white transition-colors">1</a>`;
                if (startPage > 2) {
                    html += `<span class="px-2 text-coffee">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<span class="px-4 py-2 rounded-lg bg-terracotta text-white font-medium">${i}</span>`;
                } else {
                    html += `<a href="?page=${i}" class="px-4 py-2 rounded-lg bg-white text-coffee border border-coffee/20 hover:bg-terracotta hover:text-white transition-colors">${i}</a>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += `<span class="px-2 text-coffee">...</span>`;
                }
                html += `<a href="?page=${totalPages}" class="px-4 py-2 rounded-lg bg-white text-coffee border border-coffee/20 hover:bg-terracotta hover:text-white transition-colors">${totalPages}</a>`;
            }

            // Next button
            if (currentPage < totalPages) {
                html += `
                    <a href="?page=${currentPage + 1}"
                       class="px-4 py-2 rounded-lg bg-white text-coffee border border-coffee/20 hover:bg-terracotta hover:text-white transition-colors">
                        Tiếp →
                    </a>
                `;
            }

            paginationEl.innerHTML = html;

            // Scroll to top on page change
            if (currentPage > 1) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        loadPosts();
    </script>
</body>
</html>
