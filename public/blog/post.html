<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Blog - Bonu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{cream:'#FDF8F3',warmwhite:'#FFFBF5',terracotta:'#C4704A',espresso:'#3D2314',gold:'#D4A853',coffee:'#4A3728'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; }
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
        .prose ul, .prose ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose blockquote { border-left: 4px solid #C4704A; padding-left: 1rem; font-style: italic; color: #4A3728; }
    </style>
</head>
<body class="bg-cream min-h-screen">
    <!-- Navbar -->
    <nav class="bg-espresso text-white p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">Bonu</a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-cream/80 hover:text-white">Trang chủ</a>
                <a href="/blog.html" class="text-cream/80 hover:text-white">Blog</a>
            </div>
        </div>
    </nav>

    <!-- Article -->
    <article class="max-w-4xl mx-auto px-6 py-12">
        <div id="loading" class="text-center py-12 text-coffee">Đang tải...</div>

        <div id="post-content" class="hidden">
            <a href="/blog.html" class="text-terracotta hover:underline mb-6 inline-block">← Quay lại Blog</a>

            <header class="mb-8">
                <time id="post-date" class="text-coffee/60"></time>
                <h1 id="post-title" class="text-3xl md:text-4xl font-bold text-espresso mt-2 mb-4"></h1>
                <p id="post-excerpt" class="text-xl text-coffee"></p>
            </header>

            <img id="post-image" class="w-full rounded-lg mb-8 hidden" alt="">

            <div id="post-body" class="prose text-coffee max-w-none"></div>
        </div>

        <div id="not-found" class="hidden text-center py-12">
            <h1 class="text-2xl font-bold text-espresso mb-4">Không tìm thấy bài viết</h1>
            <a href="/blog.html" class="text-terracotta hover:underline">← Quay lại Blog</a>
        </div>
    </article>

    <!-- Footer -->
    <footer class="bg-espresso text-cream/60 py-8 mt-auto">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <p>&copy; 2026 Uyen Le - F&B Business Design</p>
        </div>
    </footer>

    <script>
        async function loadPost() {
            // Get slug from URL - supports /blog/slug.html or /blog/post.html?slug=xxx
            const urlParams = new URLSearchParams(window.location.search);
            let slug = urlParams.get('slug');

            if (!slug) {
                // Try to get from path: /blog/my-slug.html
                const path = window.location.pathname;
                const match = path.match(/\/blog\/([^/]+)\.html$/);
                if (match && match[1] !== 'post') {
                    slug = match[1];
                }
            }

            if (!slug) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('not-found').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/posts.json');
                const posts = await res.json();
                const post = posts.find(p => p.slug === slug && p.status === 'published');

                document.getElementById('loading').classList.add('hidden');

                if (!post) {
                    document.getElementById('not-found').classList.remove('hidden');
                    return;
                }

                // Update page
                document.getElementById('page-title').textContent = post.title + ' - Bonu';
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-date').textContent = formatDate(post.date);
                document.getElementById('post-excerpt').textContent = post.excerpt || '';

                if (post.image) {
                    const img = document.getElementById('post-image');
                    img.src = post.image;
                    img.alt = post.title;
                    img.classList.remove('hidden');
                }

                // If post has content field, render it (supports basic markdown-like formatting)
                if (post.content) {
                    document.getElementById('post-body').innerHTML = renderContent(post.content);
                }

                document.getElementById('post-content').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loading').textContent = 'Không thể tải bài viết.';
                console.error(e);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function renderContent(content) {
            // Basic text to HTML (paragraphs)
            return content
                .split('\n\n')
                .map(p => p.trim())
                .filter(p => p)
                .map(p => `<p>${p}</p>`)
                .join('');
        }

        loadPost();
    </script>
</body>
</html>
