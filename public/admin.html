<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bonu Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{cream:'#FDF8F3',espresso:'#3D2314',terracotta:'#C4704A'}}}}</script>
</head>
<body class="bg-cream min-h-screen">
    <nav class="bg-espresso text-white p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Blog Admin</h1>
            <a href="/" class="text-cream/80 hover:text-white">View Site</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <!-- Auth -->
        <div id="auth-section" class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-bold text-espresso mb-4">GitHub Authentication</h2>
            <p class="text-gray-600 mb-4 text-sm">Enter your GitHub Personal Access Token (needs repo scope)</p>
            <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx"
                class="w-full border p-3 rounded mb-3">
            <button onclick="saveToken()" class="bg-terracotta text-white px-6 py-2 rounded">Save Token</button>
        </div>

        <!-- Posts List -->
        <div id="posts-section" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-espresso">Posts</h2>
                <button onclick="showEditor()" class="bg-terracotta text-white px-6 py-2 rounded">+ New Post</button>
            </div>
            <div id="posts-list" class="space-y-4"></div>
        </div>

        <!-- Editor -->
        <div id="editor-section" class="hidden bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold text-espresso mb-4" id="editor-title">New Post</h2>
            <input type="hidden" id="post-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input type="text" id="post-title" class="w-full border p-3 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
                    <input type="text" id="post-slug" class="w-full border p-3 rounded" placeholder="my-post-url">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Excerpt</label>
                    <textarea id="post-excerpt" rows="2" class="w-full border p-3 rounded"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Image</label>
                    <div class="flex gap-3 mb-2">
                        <input type="file" id="image-upload" accept="image/*" onchange="uploadImage()" class="flex-1 border p-2 rounded">
                        <span id="upload-status" class="text-sm text-gray-500 self-center"></span>
                    </div>
                    <input type="text" id="post-image" class="w-full border p-3 rounded" placeholder="Image URL (auto-filled after upload)">
                    <div id="image-preview" class="mt-2 hidden">
                        <img id="preview-img" class="max-h-40 rounded border">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" id="post-date" class="w-full border p-3 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select id="post-status" class="w-full border p-3 rounded">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="savePost()" class="bg-terracotta text-white px-6 py-2 rounded">Save</button>
                    <button onclick="hideEditor()" class="bg-gray-300 text-gray-700 px-6 py-2 rounded">Cancel</button>
                    <button onclick="deletePost()" id="delete-btn" class="hidden bg-red-500 text-white px-6 py-2 rounded ml-auto">Delete</button>
                </div>
            </div>
        </div>

        <div id="status" class="mt-4 p-4 rounded hidden"></div>
    </div>

    <script>
        const REPO = 'dakthi/html-bonu';
        const FILE_PATH = 'public/posts.json';
        let posts = [];
        let fileSha = '';

        function saveToken() {
            const token = document.getElementById('github-token').value;
            if (token) {
                localStorage.setItem('github_token', token);
                init();
            }
        }

        function getToken() {
            return localStorage.getItem('github_token');
        }

        async function init() {
            const token = getToken();
            if (!token) {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('posts-section').classList.add('hidden');
                return;
            }
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('posts-section').classList.remove('hidden');
            await loadPosts();
        }

        async function loadPosts() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${getToken()}` }
                });
                const data = await res.json();
                if (data.message) {
                    showStatus('GitHub error: ' + data.message, 'error');
                    return;
                }
                fileSha = data.sha;
                const binary = atob(data.content.replace(/\n/g, ''));
                const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
                const text = new TextDecoder('utf-8').decode(bytes);
                posts = JSON.parse(text);
                renderPosts();
            } catch (e) {
                showStatus('Error loading posts: ' + e.message, 'error');
            }
        }

        function renderPosts() {
            const list = document.getElementById('posts-list');
            list.innerHTML = posts.map(p => `
                <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-espresso">${p.title}</h3>
                        <p class="text-sm text-gray-500">${p.date} - ${p.status}</p>
                    </div>
                    <button onclick="editPost('${p.id}')" class="text-terracotta hover:underline">Edit</button>
                </div>
            `).join('');
        }

        function showEditor(post = null) {
            document.getElementById('editor-section').classList.remove('hidden');
            document.getElementById('posts-section').classList.add('hidden');

            if (post) {
                document.getElementById('editor-title').textContent = 'Edit Post';
                document.getElementById('post-id').value = post.id;
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-slug').value = post.slug;
                document.getElementById('post-excerpt').value = post.excerpt || '';
                document.getElementById('post-image').value = post.image || '';
                document.getElementById('post-date').value = post.date;
                document.getElementById('post-status').value = post.status;
                document.getElementById('delete-btn').classList.remove('hidden');
                // Show image preview if exists
                if (post.image) {
                    document.getElementById('preview-img').src = post.image;
                    document.getElementById('image-preview').classList.remove('hidden');
                } else {
                    document.getElementById('image-preview').classList.add('hidden');
                }
            } else {
                document.getElementById('editor-title').textContent = 'New Post';
                document.getElementById('post-id').value = '';
                document.getElementById('post-title').value = '';
                document.getElementById('post-slug').value = '';
                document.getElementById('post-excerpt').value = '';
                document.getElementById('post-image').value = '';
                document.getElementById('post-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('post-status').value = 'draft';
                document.getElementById('delete-btn').classList.add('hidden');
                document.getElementById('image-preview').classList.add('hidden');
            }
            // Reset file input
            document.getElementById('image-upload').value = '';
            document.getElementById('upload-status').textContent = '';
        }

        function hideEditor() {
            document.getElementById('editor-section').classList.add('hidden');
            document.getElementById('posts-section').classList.remove('hidden');
        }

        function editPost(id) {
            const post = posts.find(p => p.id === id);
            if (post) showEditor(post);
        }

        async function savePost() {
            const id = document.getElementById('post-id').value || Date.now().toString();
            const post = {
                id,
                title: document.getElementById('post-title').value,
                slug: document.getElementById('post-slug').value,
                excerpt: document.getElementById('post-excerpt').value,
                image: document.getElementById('post-image').value,
                date: document.getElementById('post-date').value,
                status: document.getElementById('post-status').value
            };

            const idx = posts.findIndex(p => p.id === id);
            if (idx >= 0) {
                posts[idx] = post;
            } else {
                posts.push(post);
            }

            await saveToDB();
        }

        async function deletePost() {
            const id = document.getElementById('post-id').value;
            if (!confirm('Delete this post?')) return;
            posts = posts.filter(p => p.id !== id);
            await saveToDB();
        }

        async function saveToDB() {
            try {
                showStatus('Saving...', 'info');
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update posts via admin',
                        content,
                        sha: fileSha
                    })
                });
                const data = await res.json();
                if (data.content) {
                    fileSha = data.content.sha;
                    showStatus('Saved! Deploying...', 'success');
                    hideEditor();
                    renderPosts();
                } else {
                    showStatus('Error: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                showStatus('Error saving: ' + e.message, 'error');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'bg-blue-100');
            el.classList.add(type === 'success' ? 'bg-green-100' : type === 'error' ? 'bg-red-100' : 'bg-blue-100');
        }

        async function compressImage(file, maxWidth, quality) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    // Calculate new dimensions
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }

                    // Draw to canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Export as WebP
                    canvas.toBlob((blob) => {
                        resolve({ blob, size: blob.size });
                    }, 'image/webp', quality);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        async function uploadImage() {
            const fileInput = document.getElementById('image-upload');
            const file = fileInput.files[0];
            if (!file) return;

            const statusEl = document.getElementById('upload-status');
            const originalSize = (file.size / 1024).toFixed(0);
            statusEl.textContent = `Compressing ${originalSize}KB...`;

            try {
                // Compress image using Canvas
                const compressed = await compressImage(file, 1200, 0.9);
                const compressedSize = (compressed.size / 1024).toFixed(0);
                statusEl.textContent = `Uploading ${compressedSize}KB (was ${originalSize}KB)...`;

                // Read compressed blob as base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(compressed.blob);
                });

                // Generate filename with timestamp (always .webp now)
                const filename = `${Date.now()}.webp`;
                const path = `public/images/${filename}`;

                // Check if file exists (to get SHA if updating)
                let sha = null;
                try {
                    const checkRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                        headers: { 'Authorization': `token ${getToken()}` }
                    });
                    if (checkRes.ok) {
                        const existing = await checkRes.json();
                        sha = existing.sha;
                    }
                } catch (e) {}

                // Upload to GitHub
                const body = {
                    message: `Upload image ${filename}`,
                    content: base64
                };
                if (sha) body.sha = sha;

                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (data.content) {
                    const imageUrl = `https://raw.githubusercontent.com/${REPO}/main/${path}`;
                    document.getElementById('post-image').value = imageUrl;
                    document.getElementById('preview-img').src = imageUrl;
                    document.getElementById('image-preview').classList.remove('hidden');
                    const savings = Math.round((1 - compressedSize / originalSize) * 100);
                    statusEl.textContent = `Done! ${compressedSize}KB (${savings}% smaller)`;
                } else {
                    statusEl.textContent = 'Error: ' + (data.message || 'Upload failed');
                }
            } catch (e) {
                statusEl.textContent = 'Error: ' + e.message;
            }
        }

        // Show preview when URL is manually entered
        document.getElementById('post-image').addEventListener('input', function() {
            const url = this.value;
            if (url) {
                document.getElementById('preview-img').src = url;
                document.getElementById('image-preview').classList.remove('hidden');
            } else {
                document.getElementById('image-preview').classList.add('hidden');
            }
        });

        init();
    </script>
</body>
</html>
