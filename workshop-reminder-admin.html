<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; color: #3D2314; }
      .container { max-width: 650px; margin: 0 auto; padding: 20px; background: #FDF8F3; }
      .header { background: linear-gradient(135deg, #3D2314 0%, #4A3728 100%); color: #FDF8F3; padding: 30px 20px; text-align: center; border-radius: 8px 8px 0 0; }
      .content { background: #ffffff; padding: 30px 20px; border: 1px solid #C4704A; border-top: none; border-radius: 0 0 8px 8px; }
      .highlight { background: #FFFBF5; padding: 15px; border-left: 4px solid #C4704A; margin: 20px 0; border-radius: 4px; }
      .label { font-weight: bold; color: #C4704A; display: inline-block; min-width: 120px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 style="margin: 0; font-family: 'Playfair Display', serif; font-size: 2em;">Đăng ký Workshop mới</h1>
        <p style="margin: 10px 0 0 0; color: #D4A853;">Bonu F&B</p>
      </div>
      <div class="content">
        <div class="highlight">
          <p style="margin: 0; font-weight: bold; color: #C4704A;">Nhận được ngày ${submissionDate}</p>
        </div>

        <h2 style="color: #3D2314; margin-top: 30px;">Workshop</h2>
        <p style="font-size: 1.2em; color: #C4704A; font-weight: bold;">${workshopTitle}</p>

        <h2 style="color: #3D2314; margin-top: 30px;">Thông tin người đăng ký</h2>
        <p><span class="label">Họ tên:</span> <span style="color: #4A3728;">${name}</span></p>
        <p><span class="label">Email:</span> <span style="color: #4A3728;"><a href="mailto:${email}" style="color: #C4704A;">${email}</a></span></p>

        <h2 style="color: #3D2314; margin-top: 30px;">Câu trả lời từ form</h2>
        <div style="margin-bottom: 20px;">
          <p style="margin: 0 0 8px 0; color: #C4704A; font-weight: bold;">Question 1</p>
          <p style="margin: 0; color: #4A3728; line-height: 1.6; white-space: pre-line; background: #FFFBF5; padding: 12px; border-radius: 4px;">Answer goes here</p>
        </div>
        <div style="margin-bottom: 20px;">
          <p style="margin: 0 0 8px 0; color: #C4704A; font-weight: bold;">Question 2</p>
          <p style="margin: 0; color: #4A3728; line-height: 1.6; white-space: pre-line; background: #FFFBF5; padding: 12px; border-radius: 4px;">Answer goes here</p>
        </div>
      </div>
    </div>
  </body>
</html>
